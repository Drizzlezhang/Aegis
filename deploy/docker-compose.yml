version: '3.8'

services:
  aegis:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AEGIS_DATABASE__URL: postgresql://aegis:aegis@postgres:5432/aegis
      AEGIS_REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://aegis:8001

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: