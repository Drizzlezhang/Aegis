services:
  aegis-trader:
    build:
      context: .
      dockerfile: Dockerfile
    image: aegis-trader:latest
    container_name: aegis-trader
    ports:
      - "3000:3000"
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - AEGIS_ENVIRONMENT=production
      - AEGIS_LOG_LEVEL=INFO
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 256M
          cpus: '0.25'
