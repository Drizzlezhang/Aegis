services:
  aegis-trader:
    build:
      context: .
      dockerfile: Dockerfile
    image: aegis-trader:latest
    container_name: aegis-trader
    ports:
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - AEGIS_ENVIRONMENT=production
      - AEGIS_LOG_LEVEL=INFO
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "src.cli", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Resource limits for 2GB AWS instance
    deploy:
      resources:
        limits:
          memory: 1.2G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
